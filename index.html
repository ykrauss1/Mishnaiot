<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לימוד משניות לעילוי נשמה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --parchment:#F5F0E8; --ink:#1A1208; --ink2:#3D2F1A;
  --gold:#B8922A; --gold-light:#E8C96A;
  --blue-deep:#1B3A5C; --blue-mid:#2E6DA4; --blue-light:#EBF3FE;
  --teal:#1D6B5A; --teal-light:#E8F4F0;
  --open:#E8E0D0; --border:rgba(184,146,42,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Heebo',sans-serif;background:var(--parchment);color:var(--ink);font-size:14px;}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

.topbar{background:var(--blue-deep);color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:44px;flex-shrink:0;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;letter-spacing:.3px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.lang-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;padding:4px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;}
.top-link{color:var(--gold-light);font-size:11px;cursor:pointer;text-decoration:underline;}

/* ── AUTH SCREENS ── */
.auth-wrap{max-width:340px;margin:40px auto;padding:16px;}
.auth-card{background:#fff;border-radius:14px;padding:26px;border:1.5px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.auth-logo{text-align:center;margin-bottom:18px;}
.auth-logo-icon{font-size:36px;}
.auth-logo-title{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;color:var(--blue-deep);margin-top:6px;}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;}
.auth-tab.active{color:var(--blue-deep);border-bottom-color:var(--blue-deep);}
.auth-note{font-size:11px;color:#888;text-align:center;margin-top:14px;line-height:1.5;}
.auth-err{background:#FFF0F0;border:1px solid #FCC;border-radius:7px;padding:8px 12px;font-size:12px;color:#8B2020;margin-bottom:10px;}
.auth-ok{background:#F0FFF4;border:1px solid #9EC;border-radius:7px;padding:8px 12px;font-size:12px;color:#1D6B5A;margin-bottom:10px;}

/* ── FORM ── */
.form-group{margin-bottom:11px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;border:1.5px solid #DDD;border-radius:8px;font-size:13px;font-family:'Heebo',sans-serif;color:var(--ink);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue-mid);}
.form-group small{font-size:10px;color:#999;margin-top:2px;display:block;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── BUTTONS ── */
.btn{padding:9px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Heebo',sans-serif;transition:all .15s;text-align:center;}
.btn-primary{background:var(--blue-deep);color:#fff;}
.btn-primary:hover{background:var(--blue-mid);}
.btn-primary:disabled{background:#AAA;cursor:not-allowed;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:#145045;}
.btn-ghost{background:transparent;color:#888;border:1.5px solid #DDD;}
.btn-ghost:hover{border-color:#AAA;color:var(--ink);}
.btn-danger{background:#8B2020;color:#fff;font-size:12px;}
.btn-full{width:100%;}
.btn-done{background:var(--teal);color:#fff;flex:1;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* ── DECEASED HEADER ── */
.deceased-header{background:linear-gradient(135deg,#1B3A5C,#243B55);color:#fff;padding:14px 16px 12px;text-align:center;flex-shrink:0;}
.inna-text{font-size:10px;color:rgba(255,255,255,0.6);margin-bottom:2px;font-style:italic;}
.deceased-name{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:900;}
.dates-row{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.date-box{flex:1;max-width:120px;background:rgba(255,255,255,0.1);border-radius:8px;padding:6px 8px;text-align:center;}
.date-box .lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);display:block;margin-bottom:2px;}
.date-box .val-heb{font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;color:#fff;display:block;line-height:1.2;}
.date-box .val-greg{font-size:9px;color:rgba(255,255,255,0.5);display:block;margin-top:1px;}
.day30-box{background:rgba(184,146,42,0.3)!important;border:1px solid rgba(184,146,42,0.5);}
.day30-box .val-heb{color:var(--gold-light);}

/* ── PROGRESS ── */
.progress-section{background:#fff;border-bottom:1px solid var(--border);padding:7px 16px;flex-shrink:0;}
.progress-header{display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:4px;}
.progress-bar{height:6px;background:#E8E0D0;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue-mid));border-radius:99px;transition:width .6s;}
.progress-counts{display:flex;gap:12px;margin-top:4px;font-size:10px;color:#888;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:2px;}

/* ── TABS ── */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:500;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--blue-deep);border-bottom-color:var(--blue-deep);}

.content{flex:1;overflow-y:auto;padding:10px;}

/* ── MASECHET GRID ── */
.seder-block{margin-bottom:12px;}
.seder-title{font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;color:var(--blue-deep);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.masechet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.masechet-card{border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;text-align:center;overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.masechet-card:hover{border-color:var(--blue-mid);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.masechet-card.full-taken{border-color:var(--blue-mid);}
.masechet-card.full-done{border-color:var(--teal);}
.masechet-card.mine{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,146,42,.2);}
.card-body{padding:7px 5px 4px;}
.masechet-name{font-family:'Frank Ruhl Libre',serif;font-size:12px;font-weight:700;}
.masechet-ch{font-size:9px;color:#999;margin-top:1px;}
.slot-bar{display:flex;height:5px;width:100%;}
.slot-seg{flex:1;transition:background .3s;}
.seg-taken{background:var(--blue-mid);}
.seg-done{background:var(--teal);}
.seg-mine{background:var(--gold);}
.seg-open{background:var(--open);}
.slot-names{display:flex;min-height:13px;width:100%;}
.slot-name{flex:1;font-size:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:1px 2px;color:var(--blue-mid);}
.sn-done{color:var(--teal);}
.sn-mine{color:var(--gold);font-weight:700;}
.sn-open{color:#CCC;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:var(--blue-deep);color:#fff;padding:14px 18px;flex-shrink:0;}
.modal-header h3{font-family:'Frank Ruhl Libre',serif;font-size:19px;margin-bottom:2px;}
.modal-header p{font-size:11px;color:rgba(255,255,255,.65);}
.modal-scroll{overflow-y:auto;flex:1;padding:14px 18px;}
.modal-footer{padding:10px 18px 16px;border-top:1px solid #EEE;display:flex;gap:7px;flex-shrink:0;}

/* ── PART SELECTOR ── */
.part-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.part-btn{border:1.5px solid #DDD;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;}
.part-btn:hover{border-color:var(--blue-mid);}
.part-btn.sel{background:var(--blue-deep);border-color:var(--blue-deep);color:#fff;}
.part-icon{font-size:18px;margin-bottom:3px;}
.part-label{font-size:11px;font-weight:600;}
.part-sub{font-size:9px;opacity:.7;margin-top:1px;}

/* ── NOTIFY ── */
.notify-section{background:#F8F6F0;border-radius:8px;padding:11px 12px;margin-bottom:12px;}
.notify-title{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;}
.notify-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.toggle{display:flex;align-items:center;gap:7px;cursor:pointer;}
.toggle input{width:15px;height:15px;accent-color:var(--blue-deep);cursor:pointer;}
.freq-select{padding:4px 8px;border:1.5px solid #DDD;border-radius:6px;font-size:11px;font-family:'Heebo',sans-serif;background:#fff;}

/* ── EXISTING SLOTS ── */
.existing-slots{margin-bottom:12px;}
.existing-slot{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;margin-bottom:5px;font-size:12px;}
.slot-taken-row{background:var(--blue-light);}
.slot-done-row{background:var(--teal-light);}
.slot-mine-row{background:#FFF8E0;border:1px solid rgba(184,146,42,.3);}

/* ── CARD BOX ── */
.card-box{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;border:1.5px solid var(--border);}
.card-title{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.learner-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #EEE;font-size:12px;}
.chip{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;}
.chip-blue{background:#D6E8FF;color:var(--blue-deep);}
.chip-green{background:#D6F0E8;color:var(--teal);}
.chip-gold{background:#FFF0CC;color:#7A5500;}

/* ── CREATOR PANEL ── */
.deceased-list-item{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.deceased-list-item:hover{border-color:var(--blue-mid);}
.dec-name{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;}
.dec-meta{font-size:11px;color:#888;margin-top:2px;}
.dec-actions{display:flex;gap:6px;margin-top:8px;}
.progress-mini{height:5px;background:#EEE;border-radius:99px;overflow:hidden;margin-top:6px;}
.progress-mini-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue-mid));border-radius:99px;}

/* ── SHARE BOX ── */
.share-row{display:flex;gap:7px;align-items:center;margin-top:8px;}
.share-input{flex:1;padding:7px 9px;border:1.5px solid #DDD;border-radius:7px;font-size:10px;color:#888;font-family:monospace;background:#FAFAFA;}

/* ── REMINDER BTNS ── */
.reminder-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.reminder-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'Heebo',sans-serif;}
.r-wa{background:#25D366;color:#fff;}
.r-email{background:#8B2020;color:#fff;}
.r-cal{background:#4285F4;color:#fff;}

/* ── MY BANNER ── */
.my-banner{background:linear-gradient(135deg,#FFF8E0,#FFF3CC);border:1.5px solid rgba(184,146,42,.3);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.my-banner-name{font-weight:700;font-size:13px;}
.my-banner-text{font-size:11px;color:var(--ink2);margin-top:1px;}

/* ── SUPERADMIN ── */
.sa-stat{background:#fff;border-radius:10px;padding:14px;border:1.5px solid var(--border);text-align:center;}
.sa-stat-num{font-size:28px;font-weight:700;color:var(--blue-deep);font-family:'Frank Ruhl Libre',serif;}
.sa-stat-label{font-size:11px;color:#888;margin-top:2px;}
.sa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;z-index:999;pointer-events:none;white-space:nowrap;}

/* ── NEW DECEASED FORM ── */
.page-wrap{flex:1;overflow-y:auto;padding:14px;}
.page-title{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:700;color:var(--blue-deep);margin-bottom:16px;}
.hebrew-date-hint{font-size:11px;color:#888;background:#F8F6F0;border-radius:6px;padding:7px 10px;margin-top:4px;}
</style>
</head>

async function init() {
  console.log('init: start')
  const params = new URLSearchParams(location.search)
  const slug   = params.get('id')
  const meId   = params.get('me')
  console.log('init: slug=', slug)

  // Check auth state – with 5s timeout so it never blocks
  try {
    console.log('init: checking session...')
    const sessionResult = await Promise.race([
      sb.auth.getSession(),
      new Promise(resolve => setTimeout(() => { console.warn('session timeout'); resolve({data:{session:null}}) }, 5000))
    ])
    const session = sessionResult?.data?.session
    console.log('init: session=', session ? 'exists' : 'none')
    if (session?.user) {
      authUser = session.user
      console.log('init: loading profile...')
      const { data: p } = await sb.from('mishnayot_profiles').select('*').eq('id', authUser.id).single()
      profile = p
      console.log('init: profile=', p)
    }
  } catch(e) {
    console.warn('Auth error:', e)
  }

  // Restore learner identity from URL
  if (meId && (!me || me.id !== meId)) {
    const { data } = await sb.from('learners').select('*').eq('id', meId).single()
    if (data) { me = data; localStorage.setItem('mishnayot_me', JSON.stringify(data)) }
  }

  console.log('init: no slug, authUser=', authUser ? 'yes' : 'no')
  if (!slug) {
    if (isDev) { loadDemoData(); view='deceased'; render(); return }
    view = authUser ? 'creator-panel' : 'auth'
    console.log('init: setting view=', view)
    render(); return
  }

  if (slug === 'demo') { loadDemoData(); view='deceased'; render(); return }

  console.log('init: loading deceased...')
  const { data: dec } = await sb.from('deceased').select('*').eq('unique_slug', slug).single()
  if (!dec) { document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:#888">'+t('notFound')+'</div>'; return }
  deceased = dec
  await loadAssignments()
  view = 'deceased'; render()
  console.log('init: done')
}
async function loadAssignments() {
  const { data } = await sb.from('assignments')
    .select('*, slots:learner_slots(id,learner_id,learner_name,part,status)')
    .eq('deceased_id', deceased.id)
  assignments = (data||[]).map(a=>({
    ...a, slots:(a.slots||[]).map(s=>({...s, is_mine: me && s.learner_id===me.id}))
  }))
}

function loadDemoData() {
  deceased = {id:'demo',name_he:"ר' יוסף בן אברהם",name_en:"R' Yosef ben Avraham",
    hebrew_date:'ט"ז שבט תשפ"ו',day30_hebrew:'י"ז אדר תשפ"ו',
    death_date:'2026-02-15',unique_slug:'demo',created_by:'demo'}
  assignments = MASSECHTOT.flat().map(m=>({
    id:'a-'+m.n,masechet_name:m.n,masechet_name_en:m.e,total_chapters:m.ch,deceased_id:'demo',slots:[]
  }))
  const ds=[{m:'שבת',n:'דוד כהן',p:'full',s:'taken'},{m:'עירובין',n:'רחל לוי',p:'full',s:'done'},
    {m:'ברכות',n:'שרה מזרחי',p:'half',s:'taken'},{m:'פסחים',n:'אורי ישראלי',p:'third',s:'taken'}]
  ds.forEach(d=>{const a=assignments.find(x=>x.masechet_name===d.m);
    if(a)a.slots.push({id:'s-'+d.m,learner_id:'x',learner_name:d.n,part:d.p,status:d.s,is_mine:false})})
}

function render() {

  const app = document.getElementById('app')
  const views = {
    loading:       ()=>'<div style="text-align:center;padding:60px;color:#888">'+t('loading')+'</div>',
    auth:          renderAuth,

function renderCard(m, asgn) {
  const slots=asgn?(asgn.slots||[]):[]
  const isMine=slots.some(s=>s.is_mine)
  const allDone=asgn&&slotsDone(asgn)
  const segs=buildSegments(slots)
  const bar=segs.map(s=>`<div class="slot-seg ${s.cls}" style="flex:${s.flex}"></div>`).join('')
  const names=segs.map(s=>`<div class="slot-name ${s.nc}">${s.label}</div>`).join('')
  let cls=allDone?'full-done':slots.length===1&&slots[0].part==='full'?'full-taken':isMine?'mine':''
  return `<div class="masechet-card ${cls}" onclick="openM('${m.n}')">
    <div class="card-body">
      <div class="masechet-name">${lang==='he'?m.n:m.e}</div>
      <div class="masechet-ch">${m.ch} ${t('chapters')}</div>
    </div>
    <div class="slot-bar">${bar}</div>
    <div class="slot-names">${names}</div>
  </div>`
}

function buildSegments(slots) {
  const w=p=>p==='full'?1:p==='half'?.5:1/3
  if(!slots.length) return [{flex:1,cls:'seg-open',label:t('slotOpen'),nc:'sn-open'}]
  const taken=Math.min(slots.reduce((s,sl)=>s+w(sl.part),0),1)
  const segs=slots.map(sl=>({flex:w(sl.part),
    cls:sl.status==='done'?'seg-done':sl.is_mine?'seg-mine':'seg-taken',
    label:sl.learner_name||'',
    nc:sl.status==='done'?'sn-done':sl.is_mine?'sn-mine':''}))
  if(taken<0.99) segs.push({flex:1-taken,cls:'seg-open',label:'',nc:'sn-open'})
  return segs
}

function slotsDone(a){
  const slots=a.slots||[]; if(!slots.length)return false
  const w=p=>p==='full'?1:p==='half'?.5:1/3
  return slots.reduce((s,sl)=>s+w(sl.part),0)>=0.99&&slots.every(s=>s.status==='done')
}
function slotsAny(a){return(a.slots||[]).length>0}

function autoSlug(name) {
  const slug = document.getElementById('d-slug')
  if (!slug || slug.dataset.manualEdit) return
  // Remove common prefixes/suffixes
  let clean = name
    .replace(/^ר['’`]\s*/u, '')
    .replace(/\s*ז["״]\s*ל\s*$/u, '')
    .trim()
  // Hebrew to Latin map - word-by-word for better results
  const words = {'בן':'ben','בת':'bat','בר':'bar'}
  const letters = {
    'א':'a','ב':'b','ג':'g','ד':'d','ה':'h','ו':'v','ז':'z','ח':'ch','ט':'t',
    'י':'y','כ':'k','ל':'l','מ':'m','נ':'n','ס':'s','ע':'','פ':'p','צ':'tz','ק':'k',
    'ר':'r','ש':'sh','ת':'t','ך':'ch','ם':'m','ן':'n','ף':'f','ץ':'tz'
  }
  const parts = clean.split(/\s+/).map(w => {
    if (words[w]) return words[w]
    return w.split('').map(c => letters[c] !== undefined ? letters[c] : '').join('')
  }).filter(Boolean)
  let s = parts.join('-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,50)
  if (s) {
    slug.value = s
    const preview = document.getElementById('slug-preview')
    if (preview) preview.textContent = s
  }
}

let _dateMode = 'heb'
function setDateMode(mode) {
  _dateMode = mode
  const hebP  = document.getElementById('heb-picker')
  const gregP = document.getElementById('greg-picker')

  const tabG  = document.getElementById('tab-greg')
  if (!hebP) return
  if (mode === 'heb') {
    hebP.style.display = 'block'; gregP.style.display = 'none'
    tabH.style.background = 'var(--blue-deep)'; tabH.style.color = '#fff'
    tabG.style.background = 'transparent'; tabG.style.color = '#888'
    onHebDateChange()
  } else {
    hebP.style.display = 'none'; gregP.style.display = 'block'
    tabG.style.background = 'var(--blue-deep)'; tabG.style.color = '#fff'
    tabH.style.background = 'transparent'; tabH.style.color = '#888'
  }
}

async function onHebDateChange() {
  const day      = document.getElementById('heb-day')?.value
  const month    = document.getElementById('heb-month')?.value
  const yearDisp = document.getElementById('heb-year')?.value
  if (!day || !month || !yearDisp) return
  const hy = HEB_YEAR_NUM[yearDisp]
  if (!hy) { showDateErr('שנה לא מוכרת'); return }
  showDateLoading(true)
  try {
    const url = `https://www.hebcal.com/converter?cfg=json&hd=${day}&hm=${month}&hy=${hy}&h2g=1`
    console.log('Hebcal URL:', url)
    const res  = await fetch(url)
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const data = await res.json()
    console.log('Hebcal response:', data)
    if (!data.gy) throw new Error('תגובה שגויה מהשרת')
    const isLeap = LEAP_YEARS.has(hy)
    const months = isLeap
      ? ['ניסן','אייר','סיון','תמוז','אב','אלול','תשרי','חשון','כסלו','טבת','שבט','אדר א','אדר ב']
      : ['ניסן','אייר','סיון','תמוז','אב','אלול','תשרי','חשון','כסלו','טבת','שבט','אדר']
    const hebStr   = HEB_DAYS[day-1] + ' ' + months[month-1] + ' ' + yearDisp
    const gregDate = `${data.gy}-${String(data.gm).padStart(2,'0')}-${String(data.gd).padStart(2,'0')}`
    await setDates(hebStr, gregDate)
  } catch(e) {
    console.error('Date calc error:', e)
    showDateErr('שגיאה בחישוב התאריך: ' + e.message)
  } finally {
    showDateLoading(false)
  }
}

async function onGregDateChange(dateStr) {
  if (!dateStr) return
  showDateLoading(true)
  try {
    const res  = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${dateStr.slice(0,4)}&gm=${parseInt(dateStr.slice(5,7))}&gd=${parseInt(dateStr.slice(8,10))}&g2h=1`)
    const data = await res.json()
    if (!data.hebrew) throw new Error('המרה נכשלה')
    await setDates(data.hebrew, dateStr)
  } catch(e) {
    showDateErr('שגיאה בחישוב התאריך')
  } finally {
    showDateLoading(false)
  }
}

async function setDates(hebStr, gregStr) {
  // Save to hidden fields
  document.getElementById('d-heb-date').value = hebStr
  document.getElementById('d-death').value    = gregStr

  // Calculate day 30
  const d30 = new Date(gregStr + 'T12:00:00')
  d30.setDate(d30.getDate() + 30)
  const d30Str = d30.toISOString().slice(0,10)

  // Get Hebrew date for day 30
  const res  = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${d30.getFullYear()}&gm=${d30.getMonth()+1}&gd=${d30.getDate()}&g2h=1`)
  const data = await res.json()
  const day30Heb = data.hebrew || ''

  document.getElementById('d-day30').value = day30Heb

  // Show results
  document.getElementById('date-result').style.display = 'block'
  document.getElementById('date-err').style.display    = 'none'
  document.getElementById('res-death-heb').textContent = hebStr
  document.getElementById('res-death-greg').textContent = new Date(gregStr+'T12:00:00').toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'})
  document.getElementById('res-day30-heb').textContent  = day30Heb
  document.getElementById('res-day30-greg').textContent = d30.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'})
}

function showDateLoading(show) {
  const l = document.getElementById('date-loading')
  const r = document.getElementById('date-result')
  if (l) l.style.display = show ? 'block' : 'none'
  if (r && show) r.style.display = 'none'
}
function showDateErr(msg) {
  const el = document.getElementById('date-err')
  if (el) { el.textContent = msg; el.style.display = 'block' }
}

async function calcDay30(dateStr) {
  if (!dateStr) return
  const loader = document.getElementById('d-day30-loader')
  const field  = document.getElementById('d-day30')
  if (loader) loader.style.display = 'block'
  if (field)  field.value = ''
  try {
    // Calculate gregorian date + 30 days
    const d = new Date(dateStr + 'T12:00:00')
    d.setDate(d.getDate() + 30)
    const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate()
    // Fetch Hebrew date from Hebcal API
    const res = await fetch('https://www.hebcal.com/converter?cfg=json&gy='+y+'&gm='+m+'&gd='+day+'&g2h=1')
    const data = await res.json()
    if (field && data.hebrew) field.value = data.hebrew
  } catch(e) {
    if (field) field.placeholder = 'לא ניתן לחשב אוטומטית – מלא ידנית'
  } finally {
    if (loader) loader.style.display = 'none'
  }
}

async function doLogin() {
  const email=document.getElementById('a-email')?.value?.trim()
  const pass=document.getElementById('a-pass')?.value
  const msg=document.getElementById('auth-msg')
  msg.innerHTML=''
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass})
  if(error){msg.innerHTML=`<div class="auth-err">${t('loginErr')}: ${error.message}</div>`;return}
  authUser=data.user
  const {data:p}=await sb.from('mishnayot_profiles').select('*').eq('id',authUser.id).single()
  profile=p; view='creator-panel'; render(); loadMyDeceased()
}

async function doRegister() {
  const name     = document.getElementById('a-name')?.value?.trim()
  const email    = document.getElementById('a-email')?.value?.trim()
  const cc       = document.getElementById('a-phone-cc')?.value || '+972'
  const phoneRaw = document.getElementById('a-phone')?.value?.trim()
  const phone    = phoneRaw ? cc + phoneRaw.replace(/^0/,'') : ''
  const relation = document.getElementById('a-relation')?.value?.trim()
  const pass     = document.getElementById('a-pass')?.value
  const pass2    = document.getElementById('a-pass2')?.value
  const msg      = document.getElementById('auth-msg')
  if (!name || !email || !pass) { msg.innerHTML='<div class="auth-err">נא למלא שם, מייל וסיסמה</div>'; return }
  if (pass !== pass2) { msg.innerHTML='<div class="auth-err">הסיסמאות אינן תואמות</div>'; return }
  if (pass.length < 6) { msg.innerHTML='<div class="auth-err">הסיסמה חייבת להכיל לפחות 6 תווים</div>'; return }
  const {data,error} = await sb.auth.signUp({email, password:pass, options:{data:{full_name:name}}})
  if (error) { msg.innerHTML=`<div class="auth-err">${t('registerErr')}: ${error.message}</div>`; return }
  if (data.user) {
    await sb.from('mishnayot_profiles').upsert({id:data.user.id, full_name:name, phone, relation})
  }
  msg.innerHTML=`<div class="auth-ok">${t('checkEmail')}</div>`
}

async function doResetPassword() {
  const email=document.getElementById('a-email')?.value?.trim()
  if(!email){showToast('הכנס מייל קודם');return}
  await sb.auth.resetPasswordForEmail(email,{redirectTo:SITE_URL})
  document.getElementById('auth-msg').innerHTML=`<div class="auth-ok">${t('resetSent')}</div>`
}

async function doLogout() {
  await sb.auth.signOut()
  authUser=null; profile=null; view='auth'; render()
}

async function doCreateDeceased() {
  const nameHe   = document.getElementById('d-name-he')?.value?.trim()
  const nameEn   = document.getElementById('d-name-en')?.value?.trim()
  const deathDate= document.getElementById('d-death')?.value?.trim()
  const hebDate  = document.getElementById('d-heb-date')?.value?.trim()
  const day30Heb = document.getElementById('d-day30')?.value?.trim()
  const slug     = document.getElementById('d-slug')?.value?.trim()
  const msg      = document.getElementById('create-msg')
  if (!nameHe) { msg.innerHTML='<div class="auth-err">נא להזין את שם הנפטר</div>'; return }
  if (!hebDate || !deathDate) { msg.innerHTML='<div class="auth-err">נא לבחור תאריך פטירה</div>'; return }
  if (!day30Heb) { msg.innerHTML='<div class="auth-err">יום השלושים לא חושב – המתן לחישוב</div>'; return }
  if (!slug) { msg.innerHTML='<div class="auth-err">נא להמתין ליצירת מזהה הדף</div>'; return }
  const btn=document.getElementById('create-btn')
  btn.disabled=true; btn.textContent=t('creating')
  const {data:dec,error}=await sb.from('deceased').insert({
    name_he:nameHe,name_en:nameEn||null,death_date:deathDate,
    hebrew_date:hebDate,day30_hebrew:day30Heb,
    unique_slug:slug,created_by:authUser.id
  }).select().single()
  if(error){
    msg.innerHTML=`<div class="auth-err">${error.message}</div>`
    btn.disabled=false; btn.textContent=t('createBtn'); return
  }
  // Seed all 63 massechtot
  await sb.rpc('seed_massechtot',{p_deceased_id:dec.id})
  showToast('✅ הדף נוצר!')
  view='creator-panel'; render(); loadMyDeceased()
}

async function loadMyDeceased() {
  await new Promise(r => setTimeout(r, 150))
  const el=document.getElementById('my-deceased-list'); if(!el)return
  if(!authUser){el.innerHTML='<div style="color:#AAA;font-size:12px;text-align:center;padding:20px">לא מחובר</div>';return}
  const {data,error}=await sb.from('deceased').select(`
    *, assignments(id, learner_slots(id,status))
  `).eq('created_by',authUser.id).order('created_at',{ascending:false})
  console.log('loadMyDeceased:', data?.length, 'items, error:', error?.message)
  if(error){el.innerHTML=`<div style="color:#8B2020;font-size:12px;text-align:center;padding:20px">שגיאה: ${error.message}</div>`;return}
  if(!data?.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:#AAA"><div style="font-size:28px;margin-bottom:8px">📭</div><div style="font-size:13px">${t('noDeceased')}</div></div>`;return}
  el.innerHTML=data.map(d=>{
    const allSlots=d.assignments?.flatMap(a=>a.learner_slots||[])||[]
    const total=d.assignments?.length||0
    const done=allSlots.filter(s=>s.status==='done').length
    const taken=allSlots.length
    const pct=total?Math.round(done/total*100):0
    const link=`${SITE_URL}?id=${d.unique_slug}`
    const dl=daysLeft(d.death_date)
    return `<div class="deceased-list-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="dec-name">${d.name_he}</div>
          <div class="dec-meta">${d.hebrew_date} · יום ה-30: ${d.day30_hebrew} · ${dl} ימים</div>
        </div>
        <span style="font-size:13px;font-weight:700;color:var(--teal)">${pct}%</span>
      </div>
      <div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:#888;margin-top:4px">${taken} לומדים · ${done}/${total} מסכתות</div>
      <div class="dec-actions">
        <button class="btn btn-teal btn-sm" onclick="goToDeceasedPage('${d.unique_slug}')">${t('viewPage')}</button>
        <button class="btn btn-ghost btn-sm" onclick="copyLink('${link}')">🔗 ${t('copyLink')}</button>
        <button class="btn btn-danger btn-sm" onclick="doDelete('${d.id}')">${t('deletePage')}</button>
      </div>
    </div>`
  }).join('')
}

async function goToDeceasedPage(slug) {
  const {data:dec}=await sb.from('deceased').select('*').eq('unique_slug',slug).single()
  if(!dec)return; deceased=dec; await loadAssignments(); view='deceased'; render()
}

async function doDelete(id) {
  if(!confirm(t('deleteConfirm')))return
  await sb.from('deceased').delete().eq('id',id)
  showToast('נמחק'); loadMyDeceased()
}

async function loadSuperadminData() {
  const [{data:pages},{data:users},{data:learners}]=await Promise.all([
    sb.from('deceased').select('*,mishnayot_profiles(full_name,phone)',{count:'exact'}),
    sb.from('mishnayot_profiles').select('*',{count:'exact'}),
    sb.from('learners').select('id',{count:'exact'}),
  ])
  const sn=document.getElementById('sa-pages'); if(sn)sn.textContent=pages?.length||0
  const su=document.getElementById('sa-users'); if(su)su.textContent=users?.length||0
  const sl=document.getElementById('sa-learners'); if(sl)sl.textContent=learners?.length||0
  // Pages list
  const pl=document.getElementById('sa-pages-list')
  if(pl&&pages) pl.innerHTML=pages.map(d=>`
    <div class="learner-row">
      <div>
        <div style="font-weight:600;font-size:13px">${d.name_he}</div>
        <div style="font-size:10px;color:#888">${d.profiles?.full_name||''} · ${d.profiles?.phone||''}</div>
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        <span class="chip ${d.is_active?'chip-green':'chip-blue'}">${d.is_active?'פעיל':'מושהה'}</span>
        <button class="btn btn-danger btn-sm" onclick="saDelete('${d.id}')">מחק</button>
      </div>
    </div>`).join('')
  // Users list
  const ul=document.getElementById('sa-users-list')
  if(ul&&users) ul.innerHTML=users.map(u=>`
    <div class="learner-row">
      <div>
        <div style="font-weight:600;font-size:13px">${u.full_name}</div>
        <div style="font-size:10px;color:#888">${u.phone||''} ${u.is_superadmin?'👑':''}</div>
      </div>
    </div>`).join('')
}

async function saDelete(id) {
  if(!confirm(t('deleteConfirm')))return
  await sb.from('deceased').delete().eq('id',id)
  showToast('נמחק'); loadSuperadminData()
}

async function takeMasechet(asgnId) {
  const name=document.getElementById('inp-name')?.value?.trim()
  const email=document.getElementById('inp-email')?.value?.trim()
  const phone=document.getElementById('inp-phone')?.value?.trim()
  if(!name||(!email&&!phone)){showToast(t('fillAtLeast2'));return}
  if(!selectedPart){showToast('נא לבחור כמה ללמוד');return}
  let lid=me?.id
  if(!lid){
    const {data:lrn,error}=await sb.from('learners').insert({
      deceased_id:deceased.id,name,email,phone,
      notify_email:document.getElementById('n-email')?.checked||false,
      notify_wa:document.getElementById('n-wa')?.checked||false,
    }).select().single()
    if(error){showToast('שגיאה: '+error.message);return}
    lid=lrn.id; me=lrn; localStorage.setItem('mishnayot_me',JSON.stringify(lrn))
  }
  const {error:se}=await sb.from('learner_slots').insert({
    assignment_id:asgnId,learner_id:lid,learner_name:name,part:selectedPart,status:'taken'
  })
  if(se){showToast('שגיאה: '+se.message);return}
  showToast(t('saved'))
  selectedM=null; selectedPart=null; await loadAssignments(); render()
}

async function markDone(asgnId,slotId) {
  await sb.from('learner_slots').update({status:'done',done_at:new Date().toISOString()}).eq('id',slotId)
  showToast('🎉 כל הכבוד!')
  selectedM=null; await loadAssignments(); render()
}

function viewMyPage() { view='creator-panel'; render(); loadMyDeceased() }

function copyLink(url) {
  try{navigator.clipboard.writeText(url)}catch(e){}
  showToast(t('linkCopied'))
}
function showToast(msg) {
  const old=document.getElementById('_t'); if(old)old.remove()
  const el=document.createElement('div'); el.id='_t'; el.className='toast'; el.textContent=msg
  document.body.appendChild(el); setTimeout(()=>el.remove(),2800)
}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtDate30(d){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+30);return dt.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'})}
function daysLeft(d){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+30);return Math.max(0,Math.ceil((dt-new Date())/86400000))}

// Listen for auth changes
sb.auth.onAuthStateChange(async(event,session)=>{
  console.log('auth event:', event)
  if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session?.user){
    authUser=session.user
    const {data:p}=await sb.from('mishnayot_profiles').select('*').eq('id',authUser.id).single()
    profile=p
    console.log('auth: profile loaded', p?.full_name)
    if(view==='loading'||view==='auth'){
      view='creator-panel'; render()
    }
  }
  if(event==='SIGNED_OUT'){
    authUser=null; profile=null
    if(view==='creator-panel'||view==='superadmin'){ view='auth'; render() }
  }
})
